<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteIT — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0c0c0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -.5px;
    }
    .logo span { color: #c8f04a; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .welcome {
      font-size: .85rem;
      color: rgba(255,255,255,.5);
    }
    .btn-logout {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.6);
      padding: 7px 14px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* MAIN */
    .main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
    }
    .btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #c8f04a;
      color: #0c0c0f;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .82rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-new:hover { background: #d4f557; transform: translateY(-1px); }

    /* NOTE COMPOSER */
    .composer {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
      display: none;
    }
    .composer.open { display: block; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .composer input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 12px 16px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .2s;
    }
    .composer input[type="text"]:focus { border-color: #c8f04a; }
    .composer input[type="text"]::placeholder { color: rgba(255,255,255,.3); }

    .composer textarea {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      padding: 12px 16px;
      outline: none;
      resize: none;
      min-height: 120px;
      line-height: 1.6;
      margin-bottom: 12px;
      transition: border-color .2s;
    }
    .composer textarea:focus { border-color: #c8f04a; }
    .composer textarea::placeholder { color: rgba(255,255,255,.3); }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .composer select {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
    }
    .composer select option { background: #1a1a1f; }
    .composer-btns { display: flex; gap: 8px; }
    .btn-cancel {
      background: transparent;
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.5);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-cancel:hover { border-color: rgba(255,255,255,.4); color: #f0f0f0; }
    .btn-save {
      background: #c8f04a;
      border: none;
      color: #0c0c0f;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .82rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-save:hover { background: #d4f557; }

    /* NOTES GRID */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .note-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 150px;
      animation: cardIn .3s ease both;
      position: relative;
      overflow: hidden;
    }
    @keyframes cardIn {
      from { opacity:0; transform: scale(.96) translateY(8px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .note-card:hover {
      border-color: rgba(200,240,74,.4);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(200,240,74,.08);
    }
    .note-card::before {
      content:'';
      position: absolute;
      top:0; left:0; right:0;
      height: 3px;
    }
    .note-card.tag-school::before { background: #c8f04a; }
    .note-card.tag-work::before   { background: #7c6dfa; }
    .note-card.tag-personal::before { background: #f06292; }
    .note-card.tag-other::before  { background: #4fc3f7; }

    .note-folder {
      font-size: .68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,.35);
    }
    .note-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      flex: 1;
      line-height: 1.3;
    }
    .note-preview {
      font-size: .78rem;
      color: rgba(255,255,255,.4);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.06);
      font-size: .7rem;
      color: rgba(255,255,255,.3);
    }
    .btn-delete {
      background: transparent;
      border: none;
      color: rgba(255,255,255,.25);
      cursor: pointer;
      font-size: .75rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all .15s;
      opacity: 0;
    }
    .note-card:hover .btn-delete { opacity: 1; }
    .btn-delete:hover { color: #ff6b6b; background: rgba(255,107,107,.1); }

    /* EMPTY STATE */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,.2);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      margin-bottom: 6px;
    }
    .empty-sub { font-size: .82rem; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,.3);
      font-size: .9rem;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: rgba(30,30,35,.95);
      border: 1px solid rgba(255,255,255,.1);
      border-left: 3px solid #c8f04a;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: .82rem;
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.err { border-left-color: #ff6b6b; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">Note<span>IT</span></div>
    <div class="topbar-right">
      <span class="welcome" id="welcomeMsg">Loading...</span>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="section-header">
      <div class="section-title">My Notes</div>
      <button class="btn-new" id="newNoteBtn">+ New Note</button>
    </div>

    <!-- COMPOSER -->
    <div class="composer" id="composer">
      <input type="text" id="noteTitle" placeholder="Note title…"/>
      <textarea id="noteBody" placeholder="Write your note here…"></textarea>
      <div class="composer-footer">
        <select id="noteFolder">
          <option value="school">📚 School</option>
          <option value="work">💼 Work</option>
          <option value="personal">🏠 Personal</option>
          <option value="other">📌 Other</option>
        </select>
        <div class="composer-btns">
          <button class="btn-cancel" id="cancelBtn">Cancel</button>
          <button class="btn-save" id="saveBtn">Save Note</button>
        </div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="notes-grid" id="notesGrid">
      <div class="loading">Loading your notes...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQag1nQJPGm-LnxSCfIfUI42DNQ8Ev1_w",
      authDomain: "noteit-8b57d.firebaseapp.com",
      projectId: "noteit-8b57d",
      storageBucket: "noteit-8b57d.firebasestorage.app",
      messagingSenderId: "913521285762",
      appId: "1:913521285762:web:6f6eb3e2a377f78b2a729b",
      measurementId: "G-TK4K3XLZZR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // ── AUTH GUARD ──
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      currentUser = user;
      document.getElementById("welcomeMsg").textContent =
        "Hey, " + (user.displayName ? user.displayName.split(" ")[0] : user.email) + " 👋";
      loadNotes();
    });

    // ── LOGOUT ──
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    // ── COMPOSER TOGGLE ──
    document.getElementById("newNoteBtn").addEventListener("click", () => {
      document.getElementById("composer").classList.add("open");
      document.getElementById("noteTitle").focus();
    });
    document.getElementById("cancelBtn").addEventListener("click", () => {
      document.getElementById("composer").classList.remove("open");
      document.getElementById("noteTitle").value = "";
      document.getElementById("noteBody").value = "";
    });

    // ── SAVE NOTE ──
    document.getElementById("saveBtn").addEventListener("click", async () => {
      const title = document.getElementById("noteTitle").value.trim();
      const body = document.getElementById("noteBody").value.trim();
      const folder = document.getElementById("noteFolder").value;

      if (!title) { showToast("Please add a title!", true); return; }
      if (!body)  { showToast("Note can't be empty!", true); return; }
      if (!currentUser) return;

      try {
        await addDoc(collection(db, "notes"), {
          title: title,
          text: body,
          folder: folder,
          userId: currentUser.uid,
          createdAt: serverTimestamp()
        });
        document.getElementById("noteTitle").value = "";
        document.getElementById("noteBody").value = "";
        document.getElementById("composer").classList.remove("open");
        showToast("Note saved ✓");
        loadNotes();
      } catch (err) {
        console.error(err);
        showToast("Error saving note: " + err.message, true);
      }
    });

    // ── LOAD NOTES ──
    async function loadNotes() {
      const grid = document.getElementById("notesGrid");
      grid.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const q = query(
          collection(db, "notes"),
          where("userId", "==", currentUser.uid),
          orderBy("createdAt", "desc")
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          grid.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📭</div>
              <div class="empty-title">No notes yet</div>
              <div class="empty-sub">Hit "+ New Note" to get started</div>
            </div>`;
          return;
        }

        grid.innerHTML = "";
        snapshot.forEach((docSnap, i) => {
          const data = docSnap.data();
          const date = data.createdAt?.toDate
            ? data.createdAt.toDate().toLocaleDateString("en-US", { month:"short", day:"numeric" })
            : "Just now";

          const card = document.createElement("div");
          card.className = `note-card tag-${data.folder || "other"}`;
          card.style.animationDelay = (i * 0.05) + "s";
          card.innerHTML = `
            <div class="note-folder">${folderLabel(data.folder)}</div>
            <div class="note-title">${escHtml(data.title || "Untitled")}</div>
            <div class="note-preview">${escHtml(data.text || "")}</div>
            <div class="note-footer">
              <span>${date}</span>
              <button class="btn-delete" data-id="${docSnap.id}">🗑 Delete</button>
            </div>`;
          grid.appendChild(card);
        });

        // Delete handlers
        grid.querySelectorAll(".btn-delete").forEach(btn => {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            try {
              await deleteDoc(doc(db, "notes", id));
              showToast("Note deleted.");
              loadNotes();
            } catch (err) {
              showToast("Error: " + err.message, true);
            }
          });
        });

      } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="loading">Error loading notes: ${err.message}</div>`;
      }
    }

    function folderLabel(f) {
      return { school:"📚 School", work:"💼 Work", personal:"🏠 Personal", other:"📌 Other" }[f] || "📌 Other";
    }

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    let toastTimer;
    function showToast(msg, isErr = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show" + (isErr ? " err" : "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.className = "toast", 3000);
    }
  </script>
</body>
</html>
