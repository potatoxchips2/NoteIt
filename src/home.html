<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteIT — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="home_style.css"/>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">Note<span>IT</span></div>
    <div class="topbar-right">
      <span class="welcome" id="welcomeMsg">Loading...</span>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
      <button class="btn-theme" id="themeToggle">☀️ Light Mode</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main shell">
    <aside class="sidebar">
      <div class="sidebar-label">Browse</div>
      <button class="nav-tab active" data-filter="all" id="allNotesTab">
        <span>All Notes</span>
        <span class="nav-count" id="allCount">0</span>
      </button>
      <button class="nav-tab" data-filter="favorites" id="favoritesTab">
        <span>Favorites</span>
        <span class="nav-count" id="favoritesCount">0</span>
      </button>
    </aside>

    <div class="content">
      <div class="section-header">
        <div>
          <div class="section-title" id="sectionTitle">My Notes</div>
          <div class="section-subtitle" id="sectionSubtitle">Everything you’ve written, in one place.</div>
        </div>
        <button class="btn-new" id="newNoteBtn">+ New Note</button>
      </div>

      <!-- COMPOSER -->
      <div class="composer" id="composer">
        <input type="text" id="noteTitle" placeholder="Note title…"/>
        <textarea id="noteBody" placeholder="Write your note here…"></textarea>
        <div class="composer-footer">
          <select id="noteFolder">
            <option value="school">📚 School</option>
            <option value="work">💼 Work</option>
            <option value="personal">🏠 Personal</option>
            <option value="other">📌 Other</option>
          </select>
          <div class="composer-btns">
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
            <button class="btn-save" id="saveBtn">Save Note</button>
          </div>
    <!-- COMPOSER -->
    <div class="composer" id="composer">
      <input type="text" id="noteTitle" placeholder="Note title…"/>
      <textarea id="noteBody" placeholder="Write your note here…"></textarea>
      <div class="composer-footer">
        <select id="noteFolder">
          <option value="school">📚 School</option>
          <option value="work">💼 Work</option>
          <option value="personal">🏠 Personal</option>
          <option value="other">📌 Other</option>
        </select>

      <input type="text" id="newFolderInput" placeholder="create new folder" style="display:none;">
        <div class="composer-btns">
          <button class="btn-cancel" id="cancelBtn">Cancel</button>
          <button class="btn-save" id="saveBtn">Save Note</button>
        </div>
      </div>

      <!-- NOTES -->
      <div class="notes-grid" id="notesGrid">
        <div class="loading">Loading your notes...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy, serverTimestamp, updateDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQag1nQJPGm-LnxSCfIfUI42DNQ8Ev1_w",
      authDomain: "noteit-8b57d.firebaseapp.com",
      projectId: "noteit-8b57d",
      storageBucket: "noteit-8b57d.firebasestorage.app",
      messagingSenderId: "913521285762",
      appId: "1:913521285762:web:6f6eb3e2a377f78b2a729b",
      measurementId: "G-TK4K3XLZZR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let activeFilter = "all";
    let cachedNotes = [];

    // ── AUTH GUARD ──
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      currentUser = user;
      document.getElementById("welcomeMsg").textContent =
        "Hey, " + (user.displayName ? user.displayName.split(" ")[0] : user.email) + " 👋";
      loadNotes();
    });

    // ── LOGOUT ──
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    // ── COMPOSER TOGGLE ──
    document.getElementById("newNoteBtn").addEventListener("click", () => {
      document.getElementById("composer").classList.add("open");
      document.getElementById("noteTitle").focus();
    });
    document.getElementById("cancelBtn").addEventListener("click", () => {
      document.getElementById("composer").classList.remove("open");
      document.getElementById("noteTitle").value = "";
      document.getElementById("noteBody").value = "";
    });

    // ── SAVE NOTE ──
    document.getElementById("saveBtn").addEventListener("click", async () => {
      const title = document.getElementById("noteTitle").value.trim();
      const body = document.getElementById("noteBody").value.trim();
      const folder = document.getElementById("noteFolder").value;

      if (!title) { showToast("Please add a title!", true); return; }
      if (!body)  { showToast("Note can't be empty!", true); return; }
      if (!currentUser) return;

      try {
        await addDoc(collection(db, "notes"), {
          title: title,
          text: body,
          folder: folder,
          favorite: false,
          userId: currentUser.uid,
          createdAt: serverTimestamp()
        });
        document.getElementById("noteTitle").value = "";
        document.getElementById("noteBody").value = "";
        document.getElementById("composer").classList.remove("open");
        showToast("Note saved ✓");
        loadNotes();
      } catch (err) {
        console.error(err);
        showToast("Error saving note: " + err.message, true);
      }
    });

    document.querySelectorAll(".nav-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        activeFilter = tab.dataset.filter;
        updateActiveTab();
        renderNotes();
      });
    });

    // ── LOAD NOTES ──
    async function loadNotes() {
      const grid = document.getElementById("notesGrid");
      grid.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const q = query(
          collection(db, "notes"),
          where("userId", "==", currentUser.uid),
          orderBy("createdAt", "desc")
        );
        const snapshot = await getDocs(q);
        cachedNotes = snapshot.docs.map((docSnap) => ({
          id: docSnap.id,
          ...docSnap.data()
        }));
        updateCounts();
        renderNotes();

      } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="loading">Error loading notes: ${err.message}</div>`;
      }
    }

    function renderNotes() {
      const grid = document.getElementById("notesGrid");
      const notes = activeFilter === "favorites"
        ? cachedNotes.filter((note) => note.favorite)
        : cachedNotes;

      updateSectionCopy(notes.length);

      if (!notes.length) {
        const emptyCopy = activeFilter === "favorites"
          ? {
              icon: "⭐",
              title: "No favorite notes yet",
              sub: "Tap the star on any note to pin it here."
            }
          : {
              icon: "📭",
              title: "No notes yet",
              sub: "Hit \"+ New Note\" to get started"
            };

        grid.innerHTML = `
          <div class="empty">
            <div class="empty-icon">${emptyCopy.icon}</div>
            <div class="empty-title">${emptyCopy.title}</div>
            <div class="empty-sub">${emptyCopy.sub}</div>
          </div>`;
        return;
      }

      grid.innerHTML = "";
      notes.forEach((note, i) => {
        const date = note.createdAt?.toDate
          ? note.createdAt.toDate().toLocaleDateString("en-US", { month:"short", day:"numeric" })
          : "Just now";

        const card = document.createElement("div");
        card.className = `note-card tag-${note.folder || "other"}${note.favorite ? " is-favorite" : ""}`;
        card.style.animationDelay = (i * 0.05) + "s";
        card.innerHTML = `
          <button class="btn-favorite${note.favorite ? " active" : ""}" data-id="${note.id}" aria-label="${note.favorite ? "Remove from favorites" : "Add to favorites"}">
            ${note.favorite ? "★" : "☆"}
          </button>
          <div class="note-folder">${folderLabel(note.folder)}</div>
          <div class="note-title">${escHtml(note.title || "Untitled")}</div>
          <div class="note-preview">${escHtml(note.text || "")}</div>
          <div class="note-footer">
            <span>${date}</span>
            <div class="note-actions">
              <button class="btn-edit" data-id="${note.id}">✏️ Edit</button>
              <button class="btn-delete" data-id="${note.id}">🗑 Delete</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });

      grid.querySelectorAll(".btn-favorite").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const noteId = btn.dataset.id;
          const note = cachedNotes.find((item) => item.id === noteId);
          if (!note) return;

          try {
            await updateDoc(doc(db, "notes", noteId), { favorite: !note.favorite });
            showToast(note.favorite ? "Removed from favorites." : "Added to favorites.");
            loadNotes();
          } catch (err) {
            showToast("Error: " + err.message, true);
          }
        });
      });

      grid.querySelectorAll(".btn-delete").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          try {
            await deleteDoc(doc(db, "notes", id));
            showToast("Note deleted.");
            loadNotes();
          } catch (err) {
            showToast("Error: " + err.message, true);
          }
        });
      });
    }

    function updateCounts() {
      const favorites = cachedNotes.filter((note) => note.favorite).length;
      document.getElementById("allCount").textContent = String(cachedNotes.length);
      document.getElementById("favoritesCount").textContent = String(favorites);
    }

    function updateActiveTab() {
      document.querySelectorAll(".nav-tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.filter === activeFilter);
      });
    }

    function updateSectionCopy(noteCount) {
      const title = document.getElementById("sectionTitle");
      const subtitle = document.getElementById("sectionSubtitle");

      if (activeFilter === "favorites") {
        title.textContent = "Favorite Notes";
        subtitle.textContent = noteCount
          ? "Your starred notes, separated for quick access."
          : "Star notes to build your favorites list.";
        return;
      }

      title.textContent = "My Notes";
      subtitle.textContent = noteCount
        ? "Everything you’ve written, in one place."
        : "Create your first note to get started.";
    }

    function folderLabel(f) {
      return { school:"📚 School", work:"💼 Work", personal:"🏠 Personal", other:"📌 Other" }[f] || "📌 Other";
    }

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    let toastTimer;
    function showToast(msg, isErr = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show" + (isErr ? " err" : "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.className = "toast", 3000);
    }
    document.getElementById("themeToggle").addEventListener("click", function() {
      const isLight = document.body.classList.toggle("light-mode");
      this.textContent = isLight ? "🌙 Dark Mode" : "☀️ Light Mode";
      localStorage.setItem("theme", isLight ? "light" : "dark");
    });

    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("light-mode");
      document.getElementById("themeToggle").textContent = "🌙 Dark Mode";
    }
  </script>
  <script type="module" src="home.js"></script>
  <script src="toggle.js"></script>
  
</body>
</html>
